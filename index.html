<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업일보 관리 시스템 v6 (Drive 연동)</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<!-- SheetJS Library for Excel Parsing/Writing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#21262d;--bor:#30363d;
  --acc:#2f81f7;--grn:#3fb950;--amb:#d29922;--red:#f85149;--pur:#a371f7;--cyan:#39d0d8;
  --txt:#e6edf3;--txt2:#8b949e;--txt3:#484f58;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:13px;}

.hdr{background:#1c2128;border-bottom:1px solid var(--bor);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.hdr-badge{background:var(--acc);color:#fff;font-weight:700;font-size:10px;padding:3px 7px;border-radius:3px;}
.hdr-cloud{display:flex;align-items:center;gap:10px;}
.cloud-status{font-size:11px;font-weight:600;padding:4px 8px;border-radius:4px;background:var(--sur2);color:var(--txt2);}
.cloud-status.on{background:rgba(63,185,80,.15);color:var(--grn);}

.nav{background:var(--sur);border-bottom:1px solid var(--bor);display:flex;padding:0 16px;}
.nav-btn{padding:8px 14px;border:none;background:none;color:var(--txt3);cursor:pointer;font-size:12px;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;}
.nav-btn.active{color:var(--acc);border-bottom-color:var(--acc);}

.main{padding:16px;}
.tc{display:none;}.tc.active{display:block;}
.panel{background:var(--sur);border:1px solid var(--bor);border-radius:8px;padding:16px;margin-bottom:16px;}
.stl{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;}

.fr{display:grid;gap:12px;margin-bottom:12px;}
.c2{grid-template-columns:1fr 1fr;}
label.lbl{font-size:11px;color:var(--txt3);display:block;margin-bottom:4px;}
input[type=text], input[type=date], textarea{background:var(--sur2);border:1px solid var(--bor);color:var(--txt);border-radius:5px;padding:8px;font-size:12px;width:100%;font-family:inherit;}
input:focus, textarea:focus{outline:none;border-color:var(--acc);}

.btn{padding:7px 14px;border-radius:5px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:.15s;}
.bp{background:var(--acc);color:#fff;} .bg{background:var(--grn);color:#fff;} .bk{background:transparent;color:var(--txt2);border:1px solid var(--bor);}
.btn:hover{opacity:0.9;}

.toast{position:fixed;bottom:20px;right:20px;background:var(--grn);color:#fff;padding:10px 16px;border-radius:6px;font-size:12px;font-weight:600;z-index:9999;opacity:0;pointer-events:none;transition:.3s;}
.toast.show{opacity:1;}
.note{font-size:11px;color:var(--txt3);margin-top:6px;line-height:1.4;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-badge">V6 DRIVE</div>
    <div style="font-weight:700;font-size:14px">작업일보 통합 시스템</div>
  </div>
  <div class="hdr-cloud">
    <span class="cloud-status" id="cloud-status">⚫ 오프라인</span>
    <button class="btn bp" id="btn-login" onclick="handleAuthClick()">Google 로그인</button>
    <button class="btn bk" id="btn-logout" onclick="handleSignoutClick()" style="display:none">로그아웃</button>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="switchTab('daily',this)">📋 일보 작성 & 다운로드</button>
  <button class="nav-btn" onclick="switchTab('cfg',this)">⚙ Drive 연동 설정</button>
</div>

<div class="main">
  <!-- TAB: 일보 작성 및 다운로드 -->
  <div id="tab-daily" class="tc active">
    <div class="panel">
      <div class="stl"><span>일보 작성 (DB 누적용)</span></div>
      <div class="fr c2">
        <div><label class="lbl">작업일자</label><input type="date" id="rpt-date"></div>
        <div><label class="lbl">공사명</label><input type="text" id="rpt-proj" value="GS엔텍 용잠공장 전기설비"></div>
      </div>
      <div class="fr">
        <div><label class="lbl">금일 작업 내용</label><textarea id="rpt-desc" rows="3" placeholder="작업 내용을 입력하세요..."></textarea></div>
      </div>
      <div style="text-align:right">
        <button class="btn bp" onclick="saveToMasterDB()">💾 지정 폴더 DB에 저장</button>
      </div>
    </div>

    <div class="panel">
      <div class="stl"><span>출력 센터 (Template 기반)</span></div>
      <p class="note" style="margin-bottom:12px;">구글 드라이브에 등록된 원본 엑셀 양식을 불러와 작성된 데이터를 매핑한 후 다운로드합니다.</p>
      <div style="text-align:right">
        <button class="btn bg" onclick="downloadViaTemplate()">📥 드라이브 양식으로 일보 다운로드</button>
      </div>
    </div>
  </div>

  <!-- TAB: 설정 -->
  <div id="tab-cfg" class="tc">
    <div class="panel">
      <div class="stl"><span style="color:var(--grn)">📁 구글 드라이브 폴더 및 양식 설정</span></div>
      <p class="note" style="margin-bottom:16px;">
        1. 구글 드라이브에 <b>'작업일보_통합'</b>이라는 폴더를 만들고 URL에서 Folder ID를 복사해 넣으세요.<br>
        2. 해당 폴더에 발주처 지정 <b>'빈 엑셀 양식'</b>을 업로드하고 File ID를 복사해 넣으세요.
      </p>
      
      <div class="fr">
        <div>
          <label class="lbl">1. 작업 공간 Folder ID (데이터가 저장될 폴더)</label>
          <input type="text" id="cfg-folder-id" placeholder="예: 1A2b3C4d5E6f_G7h8I9j0K...">
        </div>
        <div>
          <label class="lbl">2. 원본 엑셀 양식(Template) File ID</label>
          <input type="text" id="cfg-template-id" placeholder="예: 1zYxWvUtsR_qPoNmlkJiHg...">
        </div>
        <div>
          <label class="lbl">3. 마스터 DB (Spreadsheet) ID (지정 폴더 내 생성됨)</label>
          <div style="display:flex;gap:8px;">
            <input type="text" id="cfg-db-id" placeholder="ID가 없으면 우측 버튼으로 생성">
            <button class="btn bp" onclick="createDBInFolder()">➕ 폴더 내 DB 생성</button>
          </div>
        </div>
      </div>
      <div style="text-align:right; margin-top:16px;">
        <button class="btn bg" onclick="saveConfig()">✅ 설정 저장</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* [FACT-CHECK] 보안 규정에 따라 Client ID 입력. Drive API scope 필수 추가 */
const CLIENT_ID = '120409369849-s8bin8pbjmb9erucfa7vetkgh64isg48.apps.googleusercontent.com';
const DISCOVERY_DOCS = ['https://sheets.googleapis.com/$discovery/rest?version=v4', 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'];
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.readonly';

let tokenClient;
let isAuthenticated = false;

// 초기화
window.onload = function() {
  document.getElementById('rpt-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('cfg-folder-id').value = localStorage.getItem('v6_folder_id') || '';
  document.getElementById('cfg-template-id').value = localStorage.getItem('v6_template_id') || '';
  document.getElementById('cfg-db-id').value = localStorage.getItem('v6_db_id') || '';
};

// Google API 초기화
function gapiLoaded() { gapi.load('client', () => gapi.client.init({discoveryDocs: DISCOVERY_DOCS})); }
function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: (res) => { if (res.access_token) { isAuthenticated = true; updateUI(); toast("✅ 인증 완료"); } }
  });
}
function handleAuthClick() { tokenClient.requestAccessToken({prompt: 'consent'}); }
function handleSignoutClick() {
  const token = gapi.client.getToken();
  if (token) { google.accounts.oauth2.revoke(token.access_token, () => { gapi.client.setToken(''); isAuthenticated = false; updateUI(); }); }
}
function updateUI() {
  document.getElementById('btn-login').style.display = isAuthenticated ? 'none' : 'inline-block';
  document.getElementById('btn-logout').style.display = isAuthenticated ? 'inline-block' : 'none';
  const st = document.getElementById('cloud-status');
  st.textContent = isAuthenticated ? '🟢 온라인 (Drive 연결됨)' : '⚫ 오프라인';
  isAuthenticated ? st.classList.add('on') : st.classList.remove('on');
}

// 환경 설정 저장
function saveConfig() {
  localStorage.setItem('v6_folder_id', document.getElementById('cfg-folder-id').value.trim());
  localStorage.setItem('v6_template_id', document.getElementById('cfg-template-id').value.trim());
  localStorage.setItem('v6_db_id', document.getElementById('cfg-db-id').value.trim());
  toast("✅ 설정이 저장되었습니다.");
}

// 1 & 3: 지정 폴더 내에 마스터 DB 생성 로직
async function createDBInFolder() {
  if (!isAuthenticated) return toast("⚠ 먼저 로그인하세요.", "var(--amb)");
  const folderId = document.getElementById('cfg-folder-id').value.trim();
  if (!folderId) return toast("❌ 폴더 ID를 먼저 입력하세요.", "var(--red)");

  try {
    toast("⏳ 지정 폴더 내에 DB를 생성 중입니다...");
    // Drive API를 사용하여 특정 폴더 내에 Spreadsheet 직접 생성 (가장 확실한 방법)
    const fileMetadata = {
      name: '작업일보_마스터DB_' + new Date().toISOString().slice(0, 10),
      mimeType: 'application/vnd.google-apps.spreadsheet',
      parents: [folderId]
    };
    
    const response = await gapi.client.drive.files.create({
      resource: fileMetadata,
      fields: 'id'
    });
    
    const newDbId = response.result.id;
    document.getElementById('cfg-db-id').value = newDbId;
    saveConfig();
    toast("✅ 마스터 DB 생성 및 지정 폴더 이동 완료!");
  } catch(err) {
    console.error(err);
    toast("❌ DB 생성 실패: 폴더 ID가 올바른지 확인하세요.", "var(--red)");
  }
}

// 3. 마스터 DB에 일일 데이터 저장
async function saveToMasterDB() {
  if (!isAuthenticated) return toast("⚠ 오프라인 상태입니다.", "var(--amb)");
  const dbId = document.getElementById('cfg-db-id').value.trim();
  if (!dbId) return toast("❌ 설정에서 마스터 DB ID를 확인하세요.", "var(--red)");

  const date = document.getElementById('rpt-date').value;
  const proj = document.getElementById('rpt-proj').value;
  const desc = document.getElementById('rpt-desc').value;

  try {
    const body = { values: [[date, proj, desc, new Date().toISOString()]] };
    await gapi.client.sheets.spreadsheets.values.append({
      spreadsheetId: dbId,
      range: 'A:D', // 기본 시트에 저장
      valueInputOption: 'USER_ENTERED',
      resource: body
    });
    toast("☁️ 지정 폴더의 DB에 일보 저장 완료!");
  } catch(err) {
    console.error(err);
    toast("❌ 데이터 저장 실패", "var(--red)");
  }
}

// 2 & 4: 드라이브에서 엑셀 양식을 불러와서 데이터 매핑 후 다운로드
async function downloadViaTemplate() {
  if (!isAuthenticated) return toast("⚠ 오프라인 상태입니다.", "var(--amb)");
  const templateId = document.getElementById('cfg-template-id').value.trim();
  if (!templateId) return toast("❌ 설정에서 엑셀 양식(Template) ID를 입력하세요.", "var(--red)");

  try {
    toast("⏳ 드라이브에서 엑셀 양식을 불러오는 중...");
    const token = gapi.client.getToken().access_token;
    
    // [FACT-CHECK] 바이너리 파일은 gapi.client 대신 표준 fetch API로 읽어오는 것이 가장 안전함.
    const response = await fetch(`https://www.googleapis.com/drive/v3/files/${templateId}?alt=media`, {
      method: 'GET',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    if (!response.ok) throw new Error("양식 파일 접근 권한이 없거나 ID가 잘못되었습니다.");
    
    const arrayBuffer = await response.arrayBuffer();
    
    // SheetJS를 사용하여 바이너리 데이터 파싱
    const workbook = XLSX.read(arrayBuffer, { type: 'array' });
    const sheetName = workbook.SheetNames[0]; // 첫 번째 시트 선택
    const worksheet = workbook.Sheets[sheetName];

    // 데이터 매핑 (사용자 입력 데이터 -> 엑셀 특정 셀에 기입)
    // ※ 주의: 실제 현장 양식에 맞게 B4, C10 등 셀 주소 변경 필수
    const date = document.getElementById('rpt-date').value;
    const proj = document.getElementById('rpt-proj').value;
    const desc = document.getElementById('rpt-desc').value;

    XLSX.utils.sheet_add_aoa(worksheet, [[`작업일자: ${date}`]], {origin: "B2"}); 
    XLSX.utils.sheet_add_aoa(worksheet, [[`공사명: ${proj}`]], {origin: "B3"});
    XLSX.utils.sheet_add_aoa(worksheet, [[desc]], {origin: "C6"}); // 작업내용 예시

    // 수정된 엑셀 파일 로컬 다운로드 실행
    const outputFileName = `작업일보_${date}.xlsx`;
    XLSX.writeFile(workbook, outputFileName);
    toast(`📥 양식 기반 다운로드 완료: ${outputFileName}`);

  } catch(err) {
    console.error(err);
    toast("❌ 양식 다운로드 오류: " + err.message, "var(--red)");
  }
}

function switchTab(name, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tc').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}
function toast(msg, bg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = bg || 'var(--grn)';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
