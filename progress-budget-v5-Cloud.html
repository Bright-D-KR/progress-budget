<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업일보 관리 시스템 v5 (Cloud)</title>
<!-- Google API 및 Identity Services (최신 규격) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#21262d;--bor:#30363d;
  --acc:#2f81f7;--grn:#3fb950;--amb:#d29922;--red:#f85149;--pur:#a371f7;--cyan:#39d0d8;
  --txt:#e6edf3;--txt2:#8b949e;--txt3:#484f58;
  --hl:rgba(47,129,247,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:13px;}

/* ── 헤더 ── */
.hdr{background:#1c2128;border-bottom:1px solid var(--bor);padding:9px 16px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.hdr-badge{background:var(--acc);color:#fff;font-weight:700;font-size:10px;padding:3px 7px;border-radius:3px;}
.hdr-t{font-size:13px;font-weight:700;}
.hdr-s{font-size:10px;color:var(--txt3);}
.hdr-cloud{display:flex;align-items:center;gap:10px;}
.cloud-status{font-size:11px;font-weight:600;padding:4px 8px;border-radius:4px;background:var(--sur2);color:var(--txt2);}
.cloud-status.on{background:rgba(63,185,80,.15);color:var(--grn);}

/* ── 분야 탭 바 ── */
.type-bar{background:var(--sur);border-bottom:2px solid var(--bor);
  display:flex;align-items:center;padding:0 16px;gap:0;overflow-x:auto;}
.type-tab{padding:8px 16px;border:none;background:none;color:var(--txt3);cursor:pointer;
  font-size:12px;font-weight:600;font-family:inherit;border-bottom:3px solid transparent;
  margin-bottom:-2px;white-space:nowrap;transition:all .2s;}
.type-tab:hover{color:var(--txt);}
.type-tab.active{color:var(--acc);border-bottom-color:var(--acc);}
.type-tab.t-add{color:var(--grn);border:none;background:none;padding:6px 10px;font-size:18px;cursor:pointer;}
.type-bar-spacer{flex:1;}

/* ── 주 탭 네비 ── */
.nav{background:var(--sur);border-bottom:1px solid var(--bor);display:flex;padding:0 16px;}
.nav-btn{padding:7px 14px;border:none;background:none;color:var(--txt3);cursor:pointer;
  font-size:12px;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit;transition:all .2s;}
.nav-btn:hover{color:var(--txt);}
.nav-btn.active{color:var(--acc);border-bottom-color:var(--acc);}

.main{padding:12px 16px;}
.tc{display:none;}.tc.active{display:block;}

/* 기본 UI 컴포넌트 (V4 상속) */
.panel{background:var(--sur);border:1px solid var(--bor);border-radius:7px;padding:12px;margin-bottom:12px;}
.stl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:9px;padding-bottom:6px;border-bottom:1px solid var(--bor);
  display:flex;align-items:center;justify-content:space-between;}
label.lbl{font-size:11px;color:var(--txt3);display:block;margin-bottom:3px;}
input[type=text],input[type=date],input[type=number],select,textarea{
  background:var(--sur2);border:1px solid var(--bor);color:var(--txt);
  border-radius:5px;padding:6px 9px;font-size:12px;font-family:inherit;width:100%;transition:border-color .2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);}
.fr{display:grid;gap:9px;margin-bottom:9px;}
.c2{grid-template-columns:1fr 1fr;}
.c4{grid-template-columns:repeat(4,1fr);}

/* 버튼 */
.btn{padding:5px 12px;border-radius:5px;border:none;cursor:pointer;
  font-size:11px;font-weight:600;font-family:inherit;transition:all .15s;
  display:inline-flex;align-items:center;gap:4px;}
.bp{background:var(--acc);color:#fff;}.bp:hover{background:#1f6feb;}
.bg{background:var(--grn);color:#fff;}.bg:hover{background:#2ea043;}
.br{background:var(--red);color:#fff;}.br:hover{background:#da3633;}
.bk{background:transparent;color:var(--txt2);border:1px solid var(--bor);}.bk:hover{background:var(--sur2);}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;}

/* 테이블 */
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:var(--sur2);color:var(--txt2);font-size:11px;font-weight:600;
  padding:6px 8px;text-align:left;border-bottom:1px solid var(--bor);white-space:nowrap;}
td{padding:5px 8px;border-bottom:1px solid var(--bor);font-size:12px;vertical-align:middle;}
tr:hover td{background:var(--hl);}

/* 토스트 및 모달 */
.toast{position:fixed;bottom:16px;right:16px;background:var(--grn);color:#fff;
  padding:9px 14px;border-radius:7px;font-size:11px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,.4);z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<!-- 헤더 (구글 로그인 영역 추가) -->
<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-badge">V5 CLOUD</div>
    <div>
      <div class="hdr-t" id="site-title">작업일보 관리 시스템</div>
      <div class="hdr-s" id="site-sub">Google Cloud 동기화 대기 중</div>
    </div>
  </div>
  <div class="hdr-cloud">
    <span class="cloud-status" id="cloud-status">⚫ 오프라인 (미인증)</span>
    <button class="btn bp" id="btn-login" onclick="handleAuthClick()">Google 로그인</button>
    <button class="btn bk" id="btn-logout" onclick="handleSignoutClick()" style="display:none">로그아웃</button>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="switchTab('daily',this)">📋 일보 작성</button>
  <button class="nav-btn" onclick="switchTab('cfg',this)">⚙ 설정 및 연동</button>
</div>

<div class="main">
<!-- ══ TAB: 일보 작성 (간소화된 템플릿) ══ -->
<div id="tab-daily" class="tc active">
  <div class="panel">
    <div class="stl"><span>기본 정보 (Cloud Test)</span></div>
    <div class="fr c4">
      <div><label class="lbl">작업일자</label><input type="date" id="rpt-date"></div>
      <div><label class="lbl">공사명</label><input type="text" id="rpt-proj" value="용잠공장 전기설비 공사"></div>
    </div>
  </div>
  <div class="panel">
    <div class="stl"><span>일보 테스트 데이터 생성</span></div>
    <textarea id="rpt-special" placeholder="금일 특이사항 및 작업 내용을 입력하세요..."></textarea>
  </div>
  <div class="btn-row" style="justify-content:flex-end">
    <button class="btn bg" onclick="saveRecord()">💾 로컬 저장 및 Cloud 동기화</button>
  </div>
</div>

<!-- ══ TAB: 설정 및 클라우드 연동 ══ -->
<div id="tab-cfg" class="tc">
  <div class="panel">
    <div class="stl"><span style="color:var(--grn)">☁️ 구글 클라우드(Google Sheets) 연동 설정</span></div>
    <p style="font-size:11px;color:var(--txt3);margin-bottom:12px;line-height:1.5;">
      데이터를 안전하게 보관하기 위해 Google Sheets와 동기화합니다.<br>
      상단의 <b>[Google 로그인]</b>을 통해 권한을 부여한 후, 아래 설정을 진행하십시오.
    </p>
    <div class="fr">
      <div>
        <label class="lbl">연동된 Spreadsheet ID (마스터 DB)</label>
        <div style="display:flex;gap:6px">
          <input type="text" id="cfg-sheet-id" placeholder="예: 1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgvE2upms">
          <button class="btn bk" onclick="saveSheetId()">ID 수동저장</button>
        </div>
        <p style="font-size:10px;color:var(--txt2);margin-top:4px">
          * 시트 ID가 없는 경우 우측 버튼을 눌러 내 드라이브에 새 DB를 자동 생성할 수 있습니다.
        </p>
      </div>
    </div>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn bp" id="btn-create-db" onclick="createNewDatabase()" disabled>➕ 내 드라이브에 새 DB 생성</button>
      <button class="btn bg" id="btn-test-sync" onclick="testCloudSync()" disabled>🔄 클라우드 강제 동기화 테스트</button>
    </div>
  </div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// 환경 변수 및 설정
// ═══════════════════════════════════════════════════
const SK_SHEET_ID = 'yz_cloud_sheet_id';

// [사용자 제공 CLIENT_ID]
const CLIENT_ID = '120409369849-s8bin8pbjmb9erucfa7vetkgh64isg48.apps.googleusercontent.com';
const DISCOVERY_DOCS = [
  'https://sheets.googleapis.com/$discovery/rest?version=v4',
  'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'
];
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';

let tokenClient;
let gapiInited = false;
let gisInited = false;
let isAuthenticated = false;

// ═══════════════════════════════════════════════════
// Google API 초기화 로직 (Fact-Check: 최신 GIS 규격 적용)
// ═══════════════════════════════════════════════════
function gapiLoaded() {
  gapi.load('client', initializeGapiClient);
}

async function initializeGapiClient() {
  try {
    await gapi.client.init({
      discoveryDocs: DISCOVERY_DOCS,
    });
    gapiInited = true;
    console.log("GAPI Client Initialized.");
    checkAuthReady();
  } catch (err) {
    console.error("GAPI 초기화 오류:", err);
  }
}

function gisLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (tokenResponse) => {
      if (tokenResponse && tokenResponse.access_token) {
        isAuthenticated = true;
        updateUIForAuth();
        toast("✅ 구글 클라우드 연동 성공");
      }
    },
  });
  gisInited = true;
  console.log("GIS Client Initialized.");
  checkAuthReady();
}

function checkAuthReady() {
  if (gapiInited && gisInited) {
    console.log("Google Cloud API Ready.");
    // 로컬 환경 검사 경고 (http://localhost 또는 https 권장)
    if (window.location.protocol === 'file:') {
      toast("⚠ 보안 경고: file:// 환경에서는 구글 로그인이 차단될 수 있습니다.", "var(--amb)");
    }
  }
}

// 스크립트 비동기 로드 트리거
window.onload = function() {
  const gapiScript = document.createElement('script');
  gapiScript.src = "https://apis.google.com/js/api.js";
  gapiScript.onload = gapiLoaded;
  document.head.appendChild(gapiScript);

  const gisScript = document.createElement('script');
  gisScript.src = "https://accounts.google.com/gsi/client";
  gisScript.onload = gisLoaded;
  document.head.appendChild(gisScript);

  // 로컬 초기화
  document.getElementById('rpt-date').value = new Date().toISOString().slice(0, 10);
  document.getElementById('cfg-sheet-id').value = localStorage.getItem(SK_SHEET_ID) || '';
};

// ═══════════════════════════════════════════════════
// 로그인 / 로그아웃 제어
// ═══════════════════════════════════════════════════
function handleAuthClick() {
  if (!gapiInited || !gisInited) {
    toast("⚠ API 로딩 중입니다. 잠시 후 다시 시도하세요.", "var(--amb)");
    return;
  }
  tokenClient.requestAccessToken({prompt: 'consent'});
}

function handleSignoutClick() {
  const token = gapi.client.getToken();
  if (token !== null) {
    google.accounts.oauth2.revoke(token.access_token, () => {
      gapi.client.setToken('');
      isAuthenticated = false;
      updateUIForAuth();
      toast("로그아웃 되었습니다.");
    });
  }
}

function updateUIForAuth() {
  const btnLogin = document.getElementById('btn-login');
  const btnLogout = document.getElementById('btn-logout');
  const statusEl = document.getElementById('cloud-status');
  const btnCreate = document.getElementById('btn-create-db');
  const btnSync = document.getElementById('btn-test-sync');

  if (isAuthenticated) {
    btnLogin.style.display = 'none';
    btnLogout.style.display = 'inline-flex';
    statusEl.textContent = '🟢 온라인 (연동됨)';
    statusEl.classList.add('on');
    btnCreate.disabled = false;
    btnSync.disabled = false;
  } else {
    btnLogin.style.display = 'inline-flex';
    btnLogout.style.display = 'none';
    statusEl.textContent = '⚫ 오프라인 (미인증)';
    statusEl.classList.remove('on');
    btnCreate.disabled = true;
    btnSync.disabled = true;
  }
}

// ═══════════════════════════════════════════════════
// 클라우드 데이터베이스(Spreadsheet) 생성 및 동기화 로직
// ═══════════════════════════════════════════════════
function saveSheetId() {
  const sid = document.getElementById('cfg-sheet-id').value.trim();
  localStorage.setItem(SK_SHEET_ID, sid);
  toast("✅ Spreadsheet ID 로컬 저장 완료");
}

async function createNewDatabase() {
  if (!isAuthenticated) return;
  try {
    toast("⏳ DB 생성 중... 잠시 대기해주세요.");
    const response = await gapi.client.sheets.spreadsheets.create({
      resource: {
        properties: { title: "작업일보_통합_DB_" + new Date().toISOString().slice(0, 10) },
        sheets: [
          { properties: { title: "Raw_Data" } },
          { properties: { title: "System_Log" } }
        ]
      }
    });
    const spreadsheetId = response.result.spreadsheetId;
    document.getElementById('cfg-sheet-id').value = spreadsheetId;
    saveSheetId();
    toast("✅ 마스터 DB 생성 완료! ID가 설정에 등록되었습니다.");
  } catch (err) {
    console.error(err);
    toast("❌ DB 생성 실패: " + (err.result?.error?.message || err.message), "var(--red)");
  }
}

// 로컬 저장 후 클라우드로 덤프(Push)하는 하이브리드 동기화 함수
async function saveRecord() {
  // 1. 로컬 저장 로직 (Fast UX)
  const date = document.getElementById('rpt-date').value;
  const proj = document.getElementById('rpt-proj').value;
  const spec = document.getElementById('rpt-special').value;
  
  if(!date) { toast("❌ 작업일자 필수", "var(--red)"); return; }

  const payload = {
    date: date,
    proj: proj,
    special: spec,
    savedAt: new Date().toISOString()
  };

  // LocalStorage 저장 (예시)
  localStorage.setItem('v5_test_rec', JSON.stringify(payload));
  toast("💾 로컬 저장 완료. 클라우드 동기화 중...");

  // 2. 비동기 클라우드 동기화 (Background)
  if (isAuthenticated) {
    const sid = localStorage.getItem(SK_SHEET_ID);
    if (!sid) {
      toast("⚠ Spreadsheet ID가 없어 클라우드에 전송하지 못했습니다.", "var(--amb)");
      return;
    }
    
    try {
      // 엑셀 시트 'Raw_Data' 시트의 첫 번째 빈 줄에 Append
      const values = [
        [payload.date, payload.proj, payload.special, payload.savedAt]
      ];
      const body = { values: values };
      
      await gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId: sid,
        range: 'Raw_Data!A:D',
        valueInputOption: 'USER_ENTERED',
        resource: body
      });
      toast("☁️ 클라우드(Google Sheets) 동기화 완료!");
    } catch(err) {
      console.error("Sync Error:", err);
      toast("❌ 클라우드 동기화 실패. 추후 다시 시도됩니다.", "var(--red)");
    }
  } else {
    toast("⚠ 오프라인 상태: 로컬에만 저장되었습니다.", "var(--amb)");
  }
}

async function testCloudSync() {
  toast("강제 동기화 테스트 시작...");
  saveRecord();
}

// ═══════════════════════════════════════════════════
// UI 탭 제어 및 유틸리티
// ═══════════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tc').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

function toast(msg, bg) {
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.style.background = bg || 'var(--grn)';
  t.classList.add('show'); 
  setTimeout(() => t.classList.remove('show'), 3500);
}
</script>
</body>
</html>
